<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArchLens Diff — structural version comparison</title>
    <meta name="description" content="Compare two project trees and see what was added, removed, moved, or renamed — not just which lines changed." />
    <!-- @archlens/tokens 主題包：渲染前先依記憶套用 class，避免主題閃爍 -->
    <script>
      try {
        var t = localStorage.getItem("archlens:diff-theme") || "blueprint";
        document.documentElement.classList.add("al-theme-" + t);
      } catch (e) {
        document.documentElement.classList.add("al-theme-blueprint");
      }
    </script>
  </head>
  <body>
    <!-- ArchLens 系列反孤島導覽列（vendored，正本見 hub packages/ui） -->
    <script type="module" src="/suite-nav.js"></script>
    <suite-nav current="diff" manifest-url="https://wizerdbache.github.io/ArchLens-Suite/suite-manifest.json"></suite-nav>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
